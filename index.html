<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hacker spoon</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml/dist/js-yaml.min.js"></script>
</head>
<body>
    <header>
        <a href="#" style="text-decoration: none; color: inherit;"><h1>hacker spoon</h1></a>
        <div class="social-links">
            <a href="https://patreon.com/SYGACT?utm_medium=unknown&utm_source=join_link&utm_campaign=creatorshare_creator&utm_content=copyLink" target="_blank" class="social-backlight">P</a> |
            <a href="https://linkedin.com/in/elioamicarelli" target="_blank" class="social-backlight">in</a>        </div>
    </header>
    <main id="main-content">
        <!-- Content will be dynamically loaded here -->
    </main>

    <section class="latest-articles-section">
        <h2>Latest Articles</h2>
        <p>
            <a href="#note?file=notes/llms-social-simulation.md" target="_blank">LLMs for Social Simulation: Advancements and Challenges</a>
            &middot;
            <a href="#note?file=notes/gambling-roguelikes.md" target="_blank">The Rise of Gambling Roguelikes</a>
        </p>
    </section>

    <section class="contact-section">
        <h2>Get in Touch</h2>
        <div class="terminal-box">
            <div class="terminal-header">
                <span class="terminal-button close"></span>
                <span class="terminal-button minimize"></span>
                <span class="terminal-button maximize"></span>
                <span class="terminal-title">hacker@spoon: ~</span>
            </div>
            <div class="terminal-body">
                <form id="contact-form" action="https://formspree.io/f/mjgwjgqq" method="POST">
                    <div class="terminal-line">
                        <label for="name">visitor@hacker-spoon:~$</label>
                        <input type="text" id="name" name="name" placeholder="Your Name" required>
                    </div>
                    <div class="terminal-line">
                        <label for="email">visitor@hacker-spoon:~$</label>
                        <input type="email" id="email" name="email" placeholder="Your Email" required>
                    </div>
                    <div class="terminal-line textarea-line">
                        <label for="message">visitor@hacker-spoon:~$</label>
                        <textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea>
                    </div>
                    <div class="terminal-line">
                        <label for="submit-button">visitor@hacker-spoon:~$</label>
                        <button type="submit" id="submit-button">send_message.sh</button>
                    </div>
                    <p id="form-status"></p>
                </form>
            </div>
        </div>
    </section>

    <div class="random-text-container">
        <p id="random-text"></p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const mainContent = document.getElementById('main-content');

            // Router
            function router() {
                const hash = window.location.hash || '#home';
                const [path, queryString] = hash.substring(1).split('?');
                const urlParams = new URLSearchParams(queryString);

                mainContent.innerHTML = ''; // Clear content area

                if (path === 'home') {
                    loadHome();
                } else if (path === 'post') {
                    loadPost(urlParams.get('post'));
                } else if (path === 'notes') {
                    loadNotes();
                } else if (path === 'note') {
                    loadNote(urlParams.get('file'));
                } else if (path === 'hashtag') {
                    loadHashtag(urlParams.get('tag'));
                } else {
                    loadHome();
                }
            }

            // Content Loading Functions
            function loadHome() {
                fetch('posts.json')
                    .then(response => response.json())
                    .then(posts => {
                        const postsContainer = document.createElement('div');
                        postsContainer.classList.add('posts-container');
                        posts.forEach(post => {
                            const postPreview = document.createElement('div');
                            postPreview.classList.add('post-preview');

                            const image = document.createElement('img');
                            image.src = post.preview_image;
                            image.alt = post.title;

                            const title = document.createElement('h2');
                            title.textContent = post.title;

                            const description = document.createElement('p');
                            description.textContent = post.description;

                            const readMore = document.createElement('a');
                            readMore.textContent = 'Learn More';
                            if (post.link_type === 'markdown') {
                                readMore.href = `#post?post=${post.link_target}`;
                            } else if (post.link_type === 'external') {
                                readMore.href = post.link_target;
                                readMore.target = "_blank"; // Open external links in a new tab
                            }
                            console.log('Generated readMore href:', readMore.href);

                            postPreview.appendChild(image);
                            postPreview.appendChild(title);
                            postPreview.appendChild(description);
                            postPreview.appendChild(readMore);

                            postsContainer.appendChild(postPreview);
                        });
                        mainContent.appendChild(postsContainer);

                        // Intersection Observer for mobile scroll effect
                        if (window.matchMedia("(max-width: 768px)").matches) {
                            const previews = postsContainer.querySelectorAll('.post-preview');
                            const observer = new IntersectionObserver((entries) => {
                                entries.forEach(entry => {
                                    if (entry.isIntersecting) {
                                        entry.target.classList.add('in-view');
                                    } else {
                                        entry.target.classList.remove('in-view');
                                    }
                                });
                            }, { threshold: 0.5 }); // Trigger when 50% of the element is visible

                            previews.forEach(preview => {
                                observer.observe(preview);
                            });
                        }
                    })
                    .catch(error => console.error('Error fetching posts:', error));
            }

            function loadPost(postFile) {
                fetch(`md_posts/${postFile}`)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        return response.text();
                    })
                    .then(text => {
                        try {
                            const parts = text.split('---');
                            const frontMatter = jsyaml.load(parts[1]);
                            const markdownContent = parts.slice(2).join('---').trim();

                            const article = document.createElement('article');

                            const title = document.createElement('h2');
                            title.textContent = frontMatter.title;

                            const image = document.createElement('img');
                            image.src = frontMatter.image;
                            image.alt = frontMatter.title;

                            const content = document.createElement('div');
                            content.innerHTML = marked.parse(markdownContent);
                            
                            article.appendChild(title);
                            article.appendChild(image);
                            article.appendChild(content);

                            mainContent.appendChild(article);
                            document.title = frontMatter.title + " | hacker spoon";
                        } catch (error) {
                            console.error('Error processing post content:', error);
                            mainContent.innerHTML = `<p>There was an error loading this post: ${error.message}. Please check the console for details.</p>`;
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching post:', error);
                        mainContent.innerHTML = `<p>There was an error loading this post: ${error.message}. Please check the console for details.</p>`;
                    });
            }

            function loadNotes() {
                fetch('notebook/data.json')
                    .then(response => response.json())
                    .then(data => {
                        const articleList = document.createElement('ul');
                        articleList.id = 'article-list';
                        data.articles.sort((a, b) => new Date(b.date) - new Date(a.date));
                        data.articles.forEach(article => {
                            const listItem = document.createElement('li');
                            
                            const articleLink = document.createElement('a');
                            articleLink.href = `#note?file=${article.file}`;
                            articleLink.textContent = article.title;
                            listItem.appendChild(articleLink);
                            
                            const dateAndHashtags = document.createElement('div');
                            dateAndHashtags.className = 'meta';

                            const dateSpan = document.createElement('span');
                            dateSpan.className = 'date';
                            dateSpan.textContent = article.date;
                            dateAndHashtags.appendChild(dateSpan);

                            const hashtagSpan = document.createElement('span');
                            hashtagSpan.className = 'hashtags';
                            
                            const hashtagLinks = article.hashtags.map(tag => 
                                `<a href="#hashtag?tag=${tag}">${tag}</a>`
                            ).join(', ');

                            hashtagSpan.innerHTML = ` [${hashtagLinks}]`;
                            dateAndHashtags.appendChild(hashtagSpan);

                            listItem.appendChild(dateAndHashtags);

                            articleList.appendChild(listItem);
                        });
                        mainContent.appendChild(articleList);
                    })
                    .catch(error => console.error('Error fetching notes:', error));
            }
            
            function loadNote(noteFile) {
                fetch(`notebook/${noteFile}`)
                    .then(response => response.text())
                    .then(text => {
                        const content = document.createElement('div');
                        content.innerHTML = marked.parse(text);
                        mainContent.appendChild(content);
                        window.scrollTo(0, 0); // Scroll to the top of the page
                    })
                    .catch(error => console.error('Error fetching note:', error));
            }

            function loadHashtag(tag) {
                // This is a more complex function that would require filtering the notes.
                // For now, I will just display a message.
                const message = document.createElement('h2');
                message.textContent = `Notes tagged with: ${tag}`;
                mainContent.appendChild(message);
            }

            // Random text script
            fetch('random_texts.txt')
                .then(response => response.text())
                .then(text => {
                    const texts = text.split('\n').filter(line => line.trim() !== '');
                    const randomIndex = Math.floor(Math.random() * texts.length);
                    const randomText = texts[randomIndex];
                    const randomTextElement = document.getElementById("random-text");
                    if (randomTextElement) {
                        randomTextElement.textContent = randomText;
                    }
                })
                .catch(error => console.error('Error fetching random texts:', error));
            
            // Formspree submission handler
            const form = document.getElementById('contact-form');
            const formStatus = document.getElementById('form-status');

            async function handleSubmit(event) {
                event.preventDefault();
                const data = new FormData(event.target);
                try {
                    const response = await fetch(event.target.action, {
                        method: form.method,
                        body: data,
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    if (response.ok) {
                        formStatus.style.color = "#27c93f"; // Success color
                        formStatus.innerHTML = "visitor@hacker-spoon:~$ Thanks for your submission!";
                        form.reset();
                    } else {
                        response.json().then(data => {
                            formStatus.style.color = "#ff5f56"; // Error color
                            if (Object.hasOwn(data, 'errors')) {
                                formStatus.innerHTML = `visitor@hacker-spoon:~$ ` + data["errors"].map(error => error["message"]).join(", ");
                            } else {
                                formStatus.innerHTML = "visitor@hacker-spoon:~$ Oops! There was a problem submitting your form";
                            }
                        });
                    }
                } catch (error) {
                    formStatus.style.color = "#ff5f56"; // Error color
                    formStatus.innerHTML = "visitor@hacker-spoon:~$ Oops! There was a problem submitting your form";
                }
            }
            form.addEventListener("submit", handleSubmit);

            // Initial load and hash change listener
            router();
            window.addEventListener('hashchange', router);
        });
    </script>
</body>
</html>
